<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#006B54">
<title>Links Lab — Greenkeeper</title>
<style>
  :root {
    --masters-green: #006B54;
    --masters-green-dark: #00543F;
    --masters-green-darker: #003D2D;
    --gold: #FFD700;
    --gold-dark: #C9A227;
    --azalea: #E96A97;
    --cream: #F5F1E8;
    --cream-dark: #EBE5D2;
    --ink: #1A1A1A;
    --ink-soft: #3A3A3A;
    --line: rgba(0, 107, 84, 0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--cream);
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ============ HOME SCREEN ============ */
  .home {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at top, rgba(0, 107, 84, 0.08), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(255, 215, 0, 0.06), transparent 70%),
      var(--cream);
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 60px;
  }
  .home.hidden { display: none; }

  /* Subtle texture overlay */
  .home::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(45deg, rgba(0, 107, 84, 0.012) 0 2px, transparent 2px 6px);
    z-index: 0;
  }

  .crest {
    position: relative;
    z-index: 1;
    margin: 24px 0 12px;
    text-align: center;
  }
  .crest-mark {
    width: 96px;
    height: 96px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: var(--masters-green);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 4px var(--cream),
      0 0 0 6px var(--gold),
      0 12px 32px rgba(0, 61, 45, 0.35);
    position: relative;
  }
  .crest-mark::after {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(255, 215, 0, 0.4);
    border-radius: 50%;
  }
  .crest-mark svg { width: 52px; height: 52px; }

  .brand-name {
    font-size: 14px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--masters-green);
    font-weight: 400;
    margin-bottom: 8px;
  }
  .brand-title {
    font-size: 56px;
    line-height: 1;
    font-weight: 400;
    color: var(--masters-green-darker);
    letter-spacing: -0.01em;
    font-style: italic;
  }
  .brand-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 18px 0 8px;
    color: var(--gold-dark);
  }
  .brand-divider::before, .brand-divider::after {
    content: "";
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
  }
  .brand-divider span {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold-dark);
  }
  .brand-tagline {
    font-size: 15px;
    color: var(--ink-soft);
    font-style: italic;
    text-align: center;
    max-width: 540px;
    line-height: 1.5;
    margin-top: 4px;
  }

  /* App tile grid */
  .grid {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1180px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 22px;
    margin-top: 44px;
    padding: 0 4px;
  }

  .tile {
    background: #fff;
    border-radius: 4px;
    padding: 28px 24px 26px;
    border: 1px solid var(--line);
    box-shadow:
      0 1px 0 rgba(0, 107, 84, 0.04),
      0 12px 28px -16px rgba(0, 61, 45, 0.18);
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    text-align: left;
    font-family: inherit;
    color: inherit;
    display: flex;
    flex-direction: column;
    min-height: 240px;
  }
  .tile::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--masters-green), var(--gold), var(--masters-green));
    opacity: 0.85;
  }
  .tile:hover {
    transform: translateY(-3px);
    box-shadow:
      0 1px 0 rgba(0, 107, 84, 0.04),
      0 24px 48px -20px rgba(0, 61, 45, 0.32);
    border-color: var(--masters-green);
  }
  .tile:active { transform: translateY(-1px); }

  .tile-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--masters-green), var(--masters-green-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 16px -6px rgba(0, 61, 45, 0.5);
    margin-bottom: 18px;
    position: relative;
  }
  .tile-icon::after {
    content: "";
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    border-radius: 50%;
  }
  .tile-icon svg { width: 28px; height: 28px; color: var(--gold); }

  .tile-eyebrow {
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin-bottom: 6px;
    font-weight: 600;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .tile-title {
    font-size: 26px;
    font-weight: 400;
    color: var(--masters-green-darker);
    margin-bottom: 8px;
    line-height: 1.15;
    font-style: italic;
  }
  .tile-desc {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.55;
    flex: 1;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .tile-cta {
    margin-top: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--masters-green);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 600;
  }
  .tile-cta-arrow {
    transition: transform 0.25s ease;
  }
  .tile:hover .tile-cta-arrow {
    transform: translateX(4px);
  }

  /* Footer ribbon */
  .footer {
    position: relative;
    z-index: 1;
    margin-top: 48px;
    text-align: center;
    color: var(--ink-soft);
  }
  .footer-stats {
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .footer-stat {
    text-align: center;
  }
  .footer-stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--masters-green);
    font-family: Georgia, serif;
    font-style: italic;
  }
  .footer-stat-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin-top: 2px;
  }
  .footer-text {
    font-size: 12px;
    font-style: italic;
    margin-top: 18px;
    opacity: 0.8;
  }

  /* ============ APP VIEW (iframe shell) ============ */
  .app-view {
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 100;
    display: none;
    flex-direction: column;
  }
  .app-view.active { display: flex; }

  .app-bar {
    background: linear-gradient(180deg, var(--masters-green-dark), var(--masters-green-darker));
    color: var(--gold);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
    flex-shrink: 0;
    border-bottom: 2px solid var(--gold);
  }
  .back-btn {
    background: rgba(255, 215, 0, 0.12);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 14px 8px 10px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    font-weight: 600;
  }
  .back-btn:hover {
    background: var(--gold);
    color: var(--masters-green-darker);
  }
  .app-bar-title {
    font-style: italic;
    font-size: 16px;
    color: #fff;
    letter-spacing: 0.04em;
  }
  .app-bar-mark {
    font-size: 10px;
    letter-spacing: 0.24em;
    color: var(--gold);
    text-transform: uppercase;
  }

  iframe {
    flex: 1;
    width: 100%;
    border: 0;
    background: var(--cream);
  }

  @media (max-width: 640px) {
    .brand-title { font-size: 42px; }
    .brand-name { font-size: 12px; letter-spacing: 0.36em; }
    .crest-mark { width: 80px; height: 80px; }
    .crest-mark svg { width: 44px; height: 44px; }
    .grid { grid-template-columns: 1fr; gap: 16px; margin-top: 32px; }
    .tile { min-height: 200px; padding: 22px 20px; }
    .tile-title { font-size: 22px; }
    .footer-stats { gap: 22px; }
    .app-bar-mark { display: none; }
    .home { padding: 20px 16px 40px; }
  }
</style>
</head>
<body>

<!-- ============ HOME SCREEN ============ -->
<div class="home" id="home">
  <div class="crest">
    <div class="crest-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2 L12 20"/>
        <path d="M12 2 L20 5 L12 9 Z" fill="#FFD700"/>
        <ellipse cx="12" cy="20" rx="6" ry="1.5"/>
      </svg>
    </div>
    <div class="brand-name">Links Lab</div>
    <h1 class="brand-title">Greenkeeper</h1>
    <div class="brand-divider"><span>Established 2026</span></div>
    <p class="brand-tagline">The operating system for golf course maintenance.<br>Built on the grounds of Haggin Oaks.</p>
  </div>

  <div class="grid">

    <button class="tile" onclick="openApp('greenkeeper-super-v1.html', 'Superintendent')">
      <div class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21V12h6v9"/>
        </svg>
      </div>
      <div class="tile-eyebrow">Command Center</div>
      <div class="tile-title">Superintendent</div>
      <div class="tile-desc">Full course oversight. Crew, spray logs, tournaments, mowing, aeration, weather, and budget — all in one place.</div>
      <div class="tile-cta">
        <span>Open App</span>
        <span class="tile-cta-arrow">→</span>
      </div>
    </button>

    <button class="tile" onclick="openApp('greenkeeper-director-v1.html', 'Director')">
      <div class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/>
        </svg>
      </div>
      <div class="tile-eyebrow">Multi-Course</div>
      <div class="tile-title">Director</div>
      <div class="tile-desc">Executive dashboard for course directors. Compliance, tournaments, budgets, and crew across the entire portfolio.</div>
      <div class="tile-cta">
        <span>Open App</span>
        <span class="tile-cta-arrow">→</span>
      </div>
    </button>

    <button class="tile" onclick="openApp('greenkeeper-mechanic-v1.html', 'Mechanic')">
      <div class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
      <div class="tile-eyebrow">Fleet & Repairs</div>
      <div class="tile-title">Mechanic</div>
      <div class="tile-desc">26 machines, parts inventory, work orders, downtime tracking, and cost analytics. Built for Tom in the shop.</div>
      <div class="tile-cta">
        <span>Open App</span>
        <span class="tile-cta-arrow">→</span>
      </div>
    </button>

    <button class="tile" onclick="openApp('greenkeeper-crew-v1.html', 'Crew')">
      <div class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="tile-eyebrow">Field Mobile</div>
      <div class="tile-title">Crew</div>
      <div class="tile-desc">Daily checklists, field notes, and end-of-shift reports. Built thumb-first for 5 AM in the cart.</div>
      <div class="tile-cta">
        <span>Open App</span>
        <span class="tile-cta-arrow">→</span>
      </div>
    </button>

    <button class="tile" onclick="openApp('greenkeeper-training-v1.html', 'Super in Training')">
      <div class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <div class="tile-eyebrow">Path to Super</div>
      <div class="tile-title">Super in Training</div>
      <div class="tile-desc">OSU coursework, QAL prep, product knowledge, seeding scenarios, and mentorship notes from Rick and Paul.</div>
      <div class="tile-cta">
        <span>Open App</span>
        <span class="tile-cta-arrow">→</span>
      </div>
    </button>

  </div>

  <div class="footer">
    <div class="footer-stats">
      <div class="footer-stat">
        <div class="footer-stat-num">5</div>
        <div class="footer-stat-label">Apps</div>
      </div>
      <div class="footer-stat">
        <div class="footer-stat-num">19</div>
        <div class="footer-stat-label">Crew</div>
      </div>
      <div class="footer-stat">
        <div class="footer-stat-num">26</div>
        <div class="footer-stat-label">Machines</div>
      </div>
      <div class="footer-stat">
        <div class="footer-stat-num">36</div>
        <div class="footer-stat-label">Holes</div>
      </div>
    </div>
    <div class="footer-text">A tradition unlike any other in turf management.</div>
  </div>
</div>

<!-- ============ APP VIEW (iframe container) ============ -->
<div class="app-view" id="appView">
  <div class="app-bar">
    <button class="back-btn" onclick="closeApp()">
      <span style="font-size: 14px;">←</span>
      <span>Links Lab</span>
    </button>
    <div class="app-bar-title" id="appBarTitle">Greenkeeper</div>
    <div class="app-bar-mark">Links Lab • EST 2026</div>
  </div>
  <iframe id="appFrame" title="Greenkeeper App"></iframe>
</div>

<script>
  const home = document.getElementById('home');
  const appView = document.getElementById('appView');
  const appFrame = document.getElementById('appFrame');
  const appBarTitle = document.getElementById('appBarTitle');

  function openApp(file, title) {
    appBarTitle.textContent = title;
    appFrame.src = file;
    appView.classList.add('active');
    home.classList.add('hidden');
    window.scrollTo(0, 0);
  }

  function closeApp() {
    appView.classList.remove('active');
    home.classList.remove('hidden');
    // Clear iframe so audio/state stops
    setTimeout(() => { appFrame.src = 'about:blank'; }, 200);
  }

  // ESC to return home
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && appView.classList.contains('active')) {
      closeApp();
    }
  });
</script>

</body>
</html>
