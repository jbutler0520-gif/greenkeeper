<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Typography - no external font imports needed */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: #FDF8F0;
            color: #2D3436;
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, h6 {

            font-weight: 700;

        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #006B54 0%, #00483A 100%);

            padding: 24px 40px;
            box-shadow: 0 4px 12px rgba(0, 75, 58, 0.15);
            border-bottom: 3px solid #FFD700;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;

        .header-left {

            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;

            color: #FFD700;
        }

        .facility-name {

            padding-left: 20px;
        }

        .facility-name h2 {

            color: #FFFEF9;
            margin-bottom: 4px;
        }

        .facility-name p {
            font-size: 12px;
            color: #FFE680;
            opacity: 0.9;
        }

        .header-right {
            text-align: right;
        }

        .date-time {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        /* Main Container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 40px 60px;
        }

        /* Tabs */

            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 2px solid #C2B280;
            overflow-x: auto;
            padding-bottom: 0;
        }

        .tab-button {
            padding: 14px 24px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #636E72;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-button:hover {
            color: #006B54;
        }

        .tab-button.active {
            border-bottom-color: #FFD700;
            color: #006B54;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .summary-card {
            background: #FFFEF9;
            border: 1px solid #E8DCC8;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 75, 58, 0.08);
            transition: all 0.3s ease;
        }

        .summary-card:hover {
            box-shadow: 0 4px 16px rgba(0, 107, 84, 0.12);
            border-color: #FFD700;
        }

        .card-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #636E72;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .card-value {
            font-size: 36px;
            font-weight: 700;
            color: #006B54;
            margin-bottom: 8px;
            font-family: Georgia, 'Times New Roman', serif;
        }

        .card-detail {
            font-size: 13px;
            color: #636E72;
        }

        .health-score-good {
            color: #4A7C59;
        }

        .health-score-warning {
            color: #E96A97;
        }

        /* Course Status Cards */
        .course-cards-grid {

            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .course-card {

            border: 2px solid #E8DCC8;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 75, 58, 0.08);
            transition: all 0.3s ease;
        }

        .course-card:hover {
            border-color: #FFD700;
            box-shadow: 0 4px 16px rgba(0, 107, 84, 0.12);
        }

        .course-card-header {
            background: linear-gradient(135deg, #006B54 0%, #004a3a 100%);
            color: #FFFEF9;
            padding: 20px 24px;
            border-bottom: 3px solid #FFD700;
        }

        .course-card-header h3 {
            color: #FFFEF9;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .course-year {

        }

        .course-card-body {

        .status-label {

        }

        .status-value {

            font-weight: 600;

            gap: 32px;
            margin-bottom: 40px;

            color: #636E72;

        .data-table tbody tr:hover {

        }

        .data-table tbody tr:last-child td {

            color: #2E7D32;

        .badge-warning {
            background: #FFF3E0;
            color: #E65100;

        .badge-alert {
            background: #FCE4EC;
            color: #880E4F;
        }

        .badge-pending {
            background: #E3F2FD;
            color: #1565C0;
        }

        /* Alerts Section */

            border: 1px solid #E8DCC8;
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 40px;

        .alert-item {

            margin-bottom: 12px;
            border-left: 4px solid #E96A97;
            background: #FDF8F0;
            border-radius: 4px;
            display: flex;

        .alert-item.warning {
            border-left-color: #FFD700;
        }

        .alert-item.info {
            border-left-color: #4A7C59;
        }

        .alert-icon {
            flex-shrink: 0;
            font-size: 20px;
            color: #E96A97;
        }

        .alert-item.warning .alert-icon {

        }

        .alert-item.info .alert-icon {
            color: #4A7C59;
        }

        .alert-content h4 {
            font-size: 13px;
            margin-bottom: 4px;
            color: #00483A;
        }

        .alert-content p {
            font-size: 12px;
            color: #636E72;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {

            border-radius: 6px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;

        .btn-primary {
            background: #006B54;
            color: #FFFEF9;
        }

        .btn-primary:hover {
            background: #00483A;
            box-shadow: 0 4px 12px rgba(0, 75, 58, 0.2);

        .btn-secondary {
            background: #C2B280;
            color: #FFFEF9;

            color: #636E72;
            font-size: 12px;
            border-top: 1px solid #E8DCC8;
            background: #FFFEF9;

        /* Tab Content */
        .tab-content {

        }

            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }

            font-weight: 600;
            color: #00483A;
            margin-bottom: 8px;

            color: #636E72;
            margin-bottom: 12px;

            border-radius: 4px;

            margin-top: 20px;

            font-size: 12px;
            color: #636E72;

            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;

            margin: 0 auto 16px;
        }

        .health-ring-inner {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #FFFEF9;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .health-ring-value {
            font-size: 32px;
            font-weight: 700;
            color: #006B54;
            font-family: Georgia, 'Times New Roman', serif;
        }

        .health-ring-label {
            font-size: 10px;
            color: #636E72;
            text-transform: uppercase;
        }

        /* Section Title */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #00483A;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #FFD700;
            font-family: Georgia, 'Times New Roman', serif;
        }

        /* License Status */
        .license-row {
            padding: 12px 0;
            border-bottom: 1px solid #E8DCC8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .license-row:last-child {
            border-bottom: none;
        }

        .license-info h4 {
            font-size: 13px;
            color: #00483A;
            margin-bottom: 4px;
        }

        .license-number {
            font-size: 11px;
            color: #636E72;
        }

        /* Tournament Calendar */
        .tournament-row {
            padding: 14px 0;
            border-bottom: 1px solid #E8DCC8;
            display: grid;
            grid-template-columns: 120px 1fr 120px 100px;
            gap: 16px;
            align-items: center;
        }

        .tournament-row:last-child {
            border-bottom: none;
        }

        .tournament-date {
            font-weight: 600;
            color: #00483A;
            font-size: 12px;
        }

        .tournament-event {
            font-weight: 600;
            color: #2D3436;
        }

        .tournament-detail {
            font-size: 12px;
            color: #636E72;
            margin-top: 4px;
        }

        .tournament-course {
            text-align: center;
            font-size: 12px;
            color: #636E72;
        }

        .tournament-players {
            text-align: right;
            font-weight: 600;
            color: #006B54;
        }

        /* Compliance Timeline */
        .timeline {
            position: relative;
            padding: 20px 0;
        }

        .timeline-item {
            padding-left: 40px;
            padding-bottom: 20px;
            position: relative;
        }

        .timeline-item:before {
            content: '';
            position: absolute;
            left: 12px;
            top: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #006B54;
            border: 3px solid #FFFEF9;
            box-shadow: 0 0 0 3px #006B54;
        }

        .timeline-item:not(:last-child):after {
            content: '';
            position: absolute;
            left: 17px;
            top: 12px;
            width: 1px;
            height: calc(100% - 12px);
            background: #C2B280;
        }

        .timeline-date {
            font-weight: 600;
            font-size: 12px;
            color: #00483A;
        }

        .timeline-content {
            font-size: 13px;
            color: #2D3436;
            margin-top: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .header-right {
                text-align: left;
            }

            .container {
                padding: 20px;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .course-cards-grid {
                grid-template-columns: 1fr;
            }

            .tournament-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

            { date: 'Jan 15, 2026', course: 'MacKenzie', product: 'Fertilizer - Fall Program', applicator: 'Rick White', status: 'Complete' },

        // SVG Chart Functions
        function createLineChart(data, dataKey1, dataKey2, name1, name2) {
            const width = 550;
            const height = 300;
            const padding = { top: 20, right: 40, bottom: 40, left: 40 };
            const plotWidth = width - padding.left - padding.right;
            const plotHeight = height - padding.top - padding.bottom;

            let maxValue = 0;
            data.forEach(d => {
                if (d[dataKey1] > maxValue) maxValue = d[dataKey1];
                if (d[dataKey2] > maxValue) maxValue = d[dataKey2];
            });
            maxValue = Math.ceil(maxValue / 10) * 10;

            const xStep = plotWidth / (data.length - 1);
            const yScale = plotHeight / maxValue;

            let points1 = '';
            let points2 = '';
            data.forEach((d, i) => {
                const x = padding.left + i * xStep;
                const y1 = padding.top + plotHeight - (d[dataKey1] * yScale);
                const y2 = padding.top + plotHeight - (d[dataKey2] * yScale);
                points1 += `${x},${y1} `;
                points2 += `${x},${y2} `;
            });

            let svg = `<svg viewBox="0 0 ${width} ${height}" style="max-width: 100%;">`;

            // Grid lines
            svg += `<line x1="${padding.left}" y1="${padding.top}" x2="${padding.left}" y2="${padding.top + plotHeight}" stroke="#C2B280" stroke-width="2"/>`;
            svg += `<line x1="${padding.left}" y1="${padding.top + plotHeight}" x2="${width - padding.right}" y2="${padding.top + plotHeight}" stroke="#C2B280" stroke-width="2"/>`;

            // Y-axis labels
            for (let i = 0; i <= 4; i++) {
                const y = padding.top + (plotHeight / 4) * i;
                const value = maxValue - (maxValue / 4) * i;
                svg += `<text x="${padding.left - 10}" y="${y + 4}" text-anchor="end" font-size="12" fill="#636E72">${Math.round(value)}</text>`;
                if (i > 0) {
                    svg += `<line x1="${padding.left - 5}" y1="${y}" x2="${width - padding.right}" y2="${y}" stroke="#E8DCC8" stroke-width="1" stroke-dasharray="3 3"/>`;
                }
            }

            // X-axis labels
            data.forEach((d, i) => {
                const x = padding.left + i * xStep;
                svg += `<text x="${x}" y="${padding.top + plotHeight + 25}" text-anchor="middle" font-size="12" fill="#636E72">${d.month}</text>`;
            });

            // Lines
            svg += `<polyline points="${points1}" fill="none" stroke="#006B54" stroke-width="2"/>`;
            svg += `<polyline points="${points2}" fill="none" stroke="#FFD700" stroke-width="2"/>`;

            // Dots
            data.forEach((d, i) => {
                const x = padding.left + i * xStep;
                const y1 = padding.top + plotHeight - (d[dataKey1] * yScale);
                const y2 = padding.top + plotHeight - (d[dataKey2] * yScale);
                svg += `<circle cx="${x}" cy="${y1}" r="4" fill="#006B54"/>`;
                svg += `<circle cx="${x}" cy="${y2}" r="4" fill="#FFD700"/>`;
            });

            // Legend
            svg += `<rect x="${padding.left}" y="10" width="200" height="40" fill="white" stroke="#E8DCC8" rx="4"/>`;

            svg += `<text x="${padding.left + 40}" y="32" font-size="12" fill="#2D3436">${name1}</text>`;
            svg += `<line x1="${padding.left + 110}" y1="28" x2="${padding.left + 130}" y2="28" stroke="#FFD700" stroke-width="2"/>`;
            svg += `<text x="${padding.left + 140}" y="32" font-size="12" fill="#2D3436">${name2}</text>`;

        function createBarChart(data) {
            const width = 550;
            const height = 350;
            const padding = { top: 40, right: 40, bottom: 60, left: 60 };
            const plotWidth = width - padding.left - padding.right;
            const plotHeight = height - padding.top - padding.bottom;

            let maxValue = 0;
            data.forEach(d => {
                if (d.products > maxValue) maxValue = d.products;
                if (d.equipment > maxValue) maxValue = d.equipment;
                if (d.labor > maxValue) maxValue = d.labor;
            });
            maxValue = Math.ceil(maxValue / 5000) * 5000;

            const groupWidth = plotWidth / data.length;
            const barWidth = (groupWidth * 0.7) / 3;
            const yScale = plotHeight / maxValue;

            let svg = `<svg viewBox="0 0 ${width} ${height}" style="max-width: 100%;">`;

            // Axes
            svg += `<line x1="${padding.left}" y1="${padding.top}" x2="${padding.left}" y2="${padding.top + plotHeight}" stroke="#C2B280" stroke-width="2"/>`;
            svg += `<line x1="${padding.left}" y1="${padding.top + plotHeight}" x2="${width - padding.right}" y2="${padding.top + plotHeight}" stroke="#C2B280" stroke-width="2"/>`;

            // Y-axis labels
            for (let i = 0; i <= 4; i++) {
                const y = padding.top + (plotHeight / 4) * i;
                const value = maxValue - (maxValue / 4) * i;
                svg += `<text x="${padding.left - 10}" y="${y + 4}" text-anchor="end" font-size="12" fill="#636E72">$${Math.round(value / 1000)}k</text>`;
                if (i > 0) {
                    svg += `<line x1="${padding.left - 5}" y1="${y}" x2="${width - padding.right}" y2="${y}" stroke="#E8DCC8" stroke-width="1" stroke-dasharray="3 3"/>`;
                }
            }

            // Bars
            data.forEach((d, i) => {
                const groupX = padding.left + (i + 0.5) * groupWidth;
                const centerOffset = barWidth * 1.5;

                // Products
                const h1 = d.products * yScale;
                svg += `<rect x="${groupX - centerOffset}" y="${padding.top + plotHeight - h1}" width="${barWidth}" height="${h1}" fill="#006B54"/>`;

                // Equipment
                const h2 = d.equipment * yScale;
                svg += `<rect x="${groupX - centerOffset + barWidth}" y="${padding.top + plotHeight - h2}" width="${barWidth}" height="${h2}" fill="#FFD700"/>`;

                // Labor
                const h3 = d.labor * yScale;
                svg += `<rect x="${groupX - centerOffset + barWidth * 2}" y="${padding.top + plotHeight - h3}" width="${barWidth}" height="${h3}" fill="#4A7C59"/>`;

                // X-axis label
                svg += `<text x="${groupX}" y="${padding.top + plotHeight + 25}" text-anchor="middle" font-size="12" fill="#636E72">${d.month}</text>`;
            });

            // Legend
            svg += `<rect x="${padding.left}" y="10" width="280" height="20" fill="white" stroke="#E8DCC8" rx="4"/>`;
            svg += `<rect x="${padding.left + 10}" y="15" width="12" height="12" fill="#006B54"/>`;
            svg += `<text x="${padding.left + 28}" y="24" font-size="11" fill="#2D3436">Products</text>`;
            svg += `<rect x="${padding.left + 110}" y="15" width="12" height="12" fill="#FFD700"/>`;
            svg += `<text x="${padding.left + 128}" y="24" font-size="11" fill="#2D3436">Equipment</text>`;
            svg += `<rect x="${padding.left + 210}" y="15" width="12" height="12" fill="#4A7C59"/>`;
            svg += `<text x="${padding.left + 228}" y="24" font-size="11" fill="#2D3436">Labor</text>`;

            svg += '</svg>';
            return svg;
        }
